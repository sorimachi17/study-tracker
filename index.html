<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Study Tracker</title>
  <style>
    :root {
      --bg: #f5f7fb; --surface: #ffffff; --surface-2: #eef3f8; --text: #152033; --muted: #65748a; --line: #d9e2ee;
      --accent: #2563eb; --accent-2: #16a34a; --danger: #dc2626; --warn: #f59e0b; --shadow: 0 14px 36px rgba(21, 32, 51, 0.08);
      --heat-0: #e8edf4; --heat-1: #c7e9d2; --heat-2: #82d99c; --heat-3: #3bbd66; --heat-4: #15803d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --surface: #151f33; --surface-2: #1d2940; --text: #e5edf7; --muted: #94a3b8; --line: #26364f;
        --accent: #60a5fa; --accent-2: #4ade80; --danger: #f87171; --warn: #fbbf24; --shadow: 0 18px 42px rgba(0, 0, 0, 0.28);
        --heat-0: #253047; --heat-1: #214c35; --heat-2: #207a45; --heat-3: #16a34a; --heat-4: #4ade80;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .app-shell { max-width: 1180px; margin: 0 auto; padding: 22px; }
    .app-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    .brand-kicker { margin: 0 0 6px; color: var(--accent); font-size: 13px; font-weight: 800; }
    h1 { margin: 0; font-size: clamp(30px, 5vw, 48px); line-height: 1; letter-spacing: 0; }
    .lead { margin: 10px 0 0; color: var(--muted); font-size: 15px; }
    .header-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .btn { min-height: 40px; border: 1px solid var(--line); border-radius: 8px; padding: 0 13px; background: var(--surface); color: var(--text); font-weight: 750; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn.danger { color: var(--danger); }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
    .stack { display: grid; gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); }
    .card-pad { padding: 16px; }
    .section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
    .section-head h2, .section-head h3 { margin: 0; font-size: 18px; }
    .section-head span { color: var(--muted); font-size: 13px; font-weight: 700; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .kpi { padding: 14px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--line); }
    .kpi strong { display: block; font-size: 27px; line-height: 1.1; letter-spacing: 0; }
    .kpi span { display: block; margin-top: 5px; color: var(--muted); font-size: 12px; font-weight: 750; }
    .kpi.accent { background: rgba(37, 99, 235, .11); } .kpi.green { background: rgba(22, 163, 74, .12); } .kpi.warn { background: rgba(245, 158, 11, .13); }
    .progress-wrap { margin-top: 12px; }
    .progress-meta { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 13px; font-weight: 700; }
    .progress-bar { margin-top: 7px; height: 12px; border-radius: 999px; background: var(--surface-2); overflow: hidden; border: 1px solid var(--line); }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); border-radius: inherit; transition: width .25s; }
    .entry-form { display: grid; gap: 12px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; color: var(--muted); font-size: 12px; font-weight: 800; margin-bottom: 5px; }
    input, select, textarea { width: 100%; min-height: 46px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--text); padding: 10px 12px; outline: none; }
    textarea { min-height: 84px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, .14); }
    .quick-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-buttons .btn { min-height: 34px; padding: 0 10px; font-size: 13px; }
    .calendar-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .calendar-title { font-size: 18px; font-weight: 850; }
    .calendar-nav { display: flex; gap: 8px; }
    .calendar-nav .btn { width: 40px; padding: 0; }
    .dow, .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 5px; }
    .dow { margin-bottom: 6px; color: var(--muted); font-size: 12px; font-weight: 800; text-align: center; }
    .day { min-height: 76px; border: 1px solid var(--line); border-radius: 8px; padding: 7px; background: var(--heat-0); display: flex; flex-direction: column; justify-content: space-between; text-align: left; }
    .day.blank { opacity: 0; pointer-events: none; }
    .day.selected { outline: 2px solid var(--accent); outline-offset: 1px; }
    .day.today .num { color: var(--accent); }
    .num { font-weight: 850; }
    .mins { color: var(--muted); font-size: 12px; font-weight: 800; }
    .lvl1 { background: var(--heat-1); } .lvl2 { background: var(--heat-2); } .lvl3 { background: var(--heat-3); color: white; } .lvl4 { background: var(--heat-4); color: white; }
    .lvl3 .mins, .lvl4 .mins { color: rgba(255,255,255,.82); }
    .list { display: grid; gap: 8px; }
    .record-row, .category-row { min-height: 58px; border: 1px solid var(--line); border-radius: 8px; background: var(--surface-2); padding: 10px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .record-main { min-width: 0; }
    .record-title { font-weight: 850; }
    .record-meta { color: var(--muted); font-size: 12px; font-weight: 700; margin-top: 2px; }
    .record-note { color: var(--muted); font-size: 13px; margin-top: 5px; overflow-wrap: anywhere; }
    .pill { display: inline-flex; align-items: center; min-height: 26px; border-radius: 999px; padding: 0 9px; background: rgba(37,99,235,.12); color: var(--accent); font-size: 12px; font-weight: 850; }
    .row-actions { display: flex; gap: 6px; flex: 0 0 auto; }
    .icon-btn { min-width: 34px; height: 34px; padding: 0; border-radius: 8px; }
    .empty { color: var(--muted); background: var(--surface-2); border: 1px dashed var(--line); border-radius: 8px; padding: 14px; text-align: center; }
    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab { flex: 1; }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    .hidden, .file-input { display: none !important; }
    .toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); background: #111827; color: #fff; padding: 10px 14px; border-radius: 999px; opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 10; box-shadow: var(--shadow); }
    .toast.show { opacity: 1; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 620px) { .app-shell { padding: 14px; } .app-header { display: grid; } .header-actions { justify-content: stretch; } .header-actions .btn { flex: 1; } .form-grid, .kpi-grid { grid-template-columns: 1fr; } .day { min-height: 58px; padding: 5px; } .mins { font-size: 11px; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div><p class="brand-kicker">Study Tracker</p><h1>今日の学習を、すぐ記録。</h1><p class="lead">英語学習の時間、カテゴリ、目標達成をシンプルに管理できます。</p></div>
      <div class="header-actions"><button class="btn" id="exportCsvBtn" type="button">CSV出力</button><button class="btn" id="exportJsonBtn" type="button">JSON保存</button><button class="btn" id="importJsonBtn" type="button">JSON読込</button><input class="file-input" id="importFile" type="file" accept="application/json" /></div>
    </header>
    <section class="card card-pad" aria-label="学習サマリー"><div class="kpi-grid"><div class="kpi accent"><strong id="todayMinutes">0m</strong><span>今日の学習</span></div><div class="kpi green"><strong id="weekMinutes">0h</strong><span>今週の合計</span></div><div class="kpi warn"><strong id="goalPercent">0%</strong><span>週間目標</span></div><div class="kpi"><strong id="streakDays">0日</strong><span>連続学習</span></div></div><div class="progress-wrap"><div class="progress-meta"><span id="goalLabel">週間目標: 10h</span><span id="goalDetail">0h / 10h</span></div><div class="progress-bar"><div class="progress-fill" id="goalFill"></div></div></div></section>
    <div class="layout"><div class="stack"><section class="card card-pad"><div class="section-head"><h2>学習を記録</h2><span id="selectedDateLabel"></span></div><form class="entry-form" id="entryForm"><div class="form-grid"><div><label for="dateInput">日付</label><input id="dateInput" type="date" required /></div><div><label for="categoryInput">カテゴリ</label><select id="categoryInput" required></select></div></div><div><label for="minutesInput">学習時間</label><input id="minutesInput" type="number" min="1" step="1" placeholder="例: 45" required /></div><div class="quick-buttons" aria-label="学習時間のショートカット"><button class="btn" type="button" data-min="15">15分</button><button class="btn" type="button" data-min="25">25分</button><button class="btn" type="button" data-min="45">45分</button><button class="btn" type="button" data-min="60">60分</button><button class="btn" type="button" data-min="90">90分</button></div><div><label for="noteInput">メモ</label><textarea id="noteInput" placeholder="例: IELTS Reading、単語帳 Unit 3、シャドーイングなど"></textarea></div><button class="btn primary" type="submit">保存する</button></form></section><section class="card card-pad"><div class="calendar-toolbar"><button class="btn" id="prevMonthBtn" type="button">←</button><div class="calendar-title" id="calendarTitle"></div><button class="btn" id="nextMonthBtn" type="button">→</button></div><div class="dow"><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span><span>日</span></div><div class="calendar-grid" id="calendarGrid"></div></section></div><aside class="stack"><section class="card card-pad"><div class="tabs"><button class="btn tab active" type="button" data-panel="recentPanel">最近</button><button class="btn tab" type="button" data-panel="goalPanel">目標</button><button class="btn tab" type="button" data-panel="categoryPanel">カテゴリ</button></div><div id="recentPanel"><div class="section-head"><h3>最近の記録</h3><span id="recentCount"></span></div><div class="list" id="recentList"></div></div><div id="goalPanel" class="hidden"><div class="section-head"><h3>週間目標</h3><span>月曜始まり</span></div><div class="entry-form"><div><label for="weeklyGoalInput">目標時間</label><input id="weeklyGoalInput" type="number" min="1" step="1" /></div><button class="btn primary" id="saveGoalBtn" type="button">目標を保存</button></div></div><div id="categoryPanel" class="hidden"><div class="section-head"><h3>カテゴリ</h3><span>編集できます</span></div><div class="entry-form"><div><label for="newCategoryInput">カテゴリ名</label><input id="newCategoryInput" type="text" placeholder="例: Pronunciation" /></div><button class="btn primary" id="addCategoryBtn" type="button">追加</button></div><div class="list" id="categoryList" style="margin-top:12px"></div></div></section><section class="card card-pad"><div class="section-head"><h3>選択日の記録</h3><span id="dayTotal"></span></div><div class="list" id="dayList"></div></section></aside></div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const STORAGE={entries:'study-tracker.entries.v2',categories:'study-tracker.categories.v2',goal:'study-tracker.weeklyGoalHours.v2'};
    const defaultCategories=['Reading','Listening','Speaking','Writing','Vocabulary','Grammar'];
    let entries=load(STORAGE.entries,[]),categories=load(STORAGE.categories,defaultCategories),weeklyGoalHours=Number(localStorage.getItem(STORAGE.goal)||10),currentMonth=new Date(),selectedDate=todayKey();
    currentMonth.setDate(1);
    const $=id=>document.getElementById(id),fmt=new Intl.DateTimeFormat('ja-JP',{year:'numeric',month:'long'});
    function load(key,fallback){try{const raw=localStorage.getItem(key);return raw?JSON.parse(raw):fallback;}catch{return fallback;}}
    function save(key,value){localStorage.setItem(key,JSON.stringify(value));}
    function pad(n){return String(n).padStart(2,'0');}
    function dateKey(date){return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;}
    function todayKey(){return dateKey(new Date());}
    function parseDate(key){const [y,m,d]=key.split('-').map(Number);return new Date(y,m-1,d);}
    function minutesLabel(minutes){if(minutes<60)return `${minutes}m`;const h=Math.floor(minutes/60),m=minutes%60;return m?`${h}h ${m}m`:`${h}h`;}
    function weekStart(date){const d=new Date(date),day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d;}
    function inRange(key,start,end){const d=parseDate(key);return d>=start&&d<=end;}
    function sumEntries(filter){return entries.filter(filter).reduce((total,entry)=>total+Number(entry.minutes||0),0);}
    function entriesForDate(key){return entries.filter(entry=>entry.date===key).sort((a,b)=>b.createdAt-a.createdAt);}
    function showToast(message){const toast=$('toast');toast.textContent=message;toast.classList.add('show');window.clearTimeout(showToast.timer);showToast.timer=window.setTimeout(()=>toast.classList.remove('show'),1800);}
    function escapeHtml(value){return String(value).replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));}
    function renderAll(){renderCategorySelect();renderDashboard();renderCalendar();renderRecent();renderSelectedDay();renderCategories();$('weeklyGoalInput').value=weeklyGoalHours;$('dateInput').value=selectedDate;$('selectedDateLabel').textContent=selectedDate;}
    function renderCategorySelect(){$('categoryInput').innerHTML=categories.map(cat=>`<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join('');}
    function renderDashboard(){const today=todayKey(),start=weekStart(new Date()),end=new Date(start);end.setDate(end.getDate()+6);end.setHours(23,59,59,999);const todayMin=sumEntries(e=>e.date===today),weekMin=sumEntries(e=>inRange(e.date,start,end)),goalMin=weeklyGoalHours*60,pct=goalMin?Math.min(100,Math.round(weekMin/goalMin*100)):0;$('todayMinutes').textContent=minutesLabel(todayMin);$('weekMinutes').textContent=minutesLabel(weekMin);$('goalPercent').textContent=`${pct}%`;$('streakDays').textContent=`${calculateStreak()}日`;$('goalLabel').textContent=`週間目標: ${weeklyGoalHours}h`;$('goalDetail').textContent=`${minutesLabel(weekMin)} / ${weeklyGoalHours}h`;$('goalFill').style.width=`${pct}%`;}
    function calculateStreak(){let streak=0;const d=new Date();while(true){const key=dateKey(d);if(sumEntries(entry=>entry.date===key)<=0)break;streak++;d.setDate(d.getDate()-1);}return streak;}
    function renderCalendar(){const y=currentMonth.getFullYear(),m=currentMonth.getMonth();$('calendarTitle').textContent=fmt.format(currentMonth);const first=new Date(y,m,1),last=new Date(y,m+1,0),firstOffset=(first.getDay()+6)%7,monthTotals=[];for(let d=1;d<=last.getDate();d++){const key=`${y}-${pad(m+1)}-${pad(d)}`;monthTotals.push(sumEntries(entry=>entry.date===key));}const max=Math.max(...monthTotals,1),cells=[];for(let i=0;i<firstOffset;i++)cells.push('<button class="day blank" type="button"></button>');for(let d=1;d<=last.getDate();d++){const key=`${y}-${pad(m+1)}-${pad(d)}`,total=monthTotals[d-1],level=total===0?0:Math.min(4,Math.ceil(total/max*4)),classes=['day',`lvl${level}`];if(key===selectedDate)classes.push('selected');if(key===todayKey())classes.push('today');cells.push(`<button class="${classes.join(' ')}" type="button" data-date="${key}"><span class="num">${d}</span><span class="mins">${total?minutesLabel(total):''}</span></button>`);}$('calendarGrid').innerHTML=cells.join('');}
    function renderRecent(){const recent=[...entries].sort((a,b)=>b.createdAt-a.createdAt).slice(0,8);$('recentCount').textContent=`${entries.length}件`;$('recentList').innerHTML=recent.length?recent.map(recordTemplate).join(''):'<div class="empty">まだ記録がありません。</div>';}
    function renderSelectedDay(){const list=entriesForDate(selectedDate),total=list.reduce((sum,item)=>sum+item.minutes,0);$('dayTotal').textContent=minutesLabel(total);$('dayList').innerHTML=list.length?list.map(recordTemplate).join(''):'<div class="empty">この日の記録はありません。</div>';$('selectedDateLabel').textContent=selectedDate;$('dateInput').value=selectedDate;}
    function recordTemplate(entry){return `<div class="record-row"><div class="record-main"><div class="record-title"><span class="pill">${escapeHtml(entry.category)}</span> ${minutesLabel(entry.minutes)}</div><div class="record-meta">${entry.date}</div>${entry.note?`<div class="record-note">${escapeHtml(entry.note)}</div>`:''}</div><div class="row-actions"><button class="btn icon-btn danger" type="button" data-delete="${entry.id}">削除</button></div></div>`;}
    function renderCategories(){$('categoryList').innerHTML=categories.map((cat,index)=>`<div class="category-row"><span>${escapeHtml(cat)}</span><div class="row-actions"><button class="btn icon-btn" type="button" data-cat-up="${index}">↑</button><button class="btn icon-btn" type="button" data-cat-down="${index}">↓</button><button class="btn icon-btn danger" type="button" data-cat-delete="${index}">削除</button></div></div>`).join('');}
    $('entryForm').addEventListener('submit',event=>{event.preventDefault();const date=$('dateInput').value||todayKey(),category=$('categoryInput').value,minutes=Number($('minutesInput').value),note=$('noteInput').value.trim();if(!date||!category||!minutes||minutes<1)return;entries.push({id:`${Date.now()}-${Math.random().toString(16).slice(2)}`,date,category,minutes,note,createdAt:Date.now()});save(STORAGE.entries,entries);selectedDate=date;$('minutesInput').value='';$('noteInput').value='';renderAll();showToast('記録しました');});
    document.querySelector('.quick-buttons').addEventListener('click',event=>{const btn=event.target.closest('[data-min]');if(btn)$('minutesInput').value=btn.dataset.min;});
    $('calendarGrid').addEventListener('click',event=>{const btn=event.target.closest('[data-date]');if(!btn)return;selectedDate=btn.dataset.date;renderCalendar();renderSelectedDay();});
    $('prevMonthBtn').addEventListener('click',()=>{currentMonth.setMonth(currentMonth.getMonth()-1);renderCalendar();});$('nextMonthBtn').addEventListener('click',()=>{currentMonth.setMonth(currentMonth.getMonth()+1);renderCalendar();});
    document.body.addEventListener('click',event=>{const del=event.target.closest('[data-delete]');if(del){entries=entries.filter(entry=>entry.id!==del.dataset.delete);save(STORAGE.entries,entries);renderAll();showToast('削除しました');return;}const tab=event.target.closest('[data-panel]');if(tab){document.querySelectorAll('.tab').forEach(item=>item.classList.toggle('active',item===tab));['recentPanel','goalPanel','categoryPanel'].forEach(id=>$(id).classList.toggle('hidden',id!==tab.dataset.panel));}});
    $('saveGoalBtn').addEventListener('click',()=>{const value=Number($('weeklyGoalInput').value);if(!value||value<1)return;weeklyGoalHours=value;localStorage.setItem(STORAGE.goal,String(weeklyGoalHours));renderDashboard();showToast('目標を保存しました');});
    $('addCategoryBtn').addEventListener('click',()=>{const name=$('newCategoryInput').value.trim();if(!name)return;if(categories.includes(name)){showToast('すでにあります');return;}categories.push(name);save(STORAGE.categories,categories);$('newCategoryInput').value='';renderCategorySelect();renderCategories();showToast('カテゴリを追加しました');});
    $('categoryList').addEventListener('click',event=>{const up=event.target.closest('[data-cat-up]'),down=event.target.closest('[data-cat-down]'),del=event.target.closest('[data-cat-delete]');if(up){const i=Number(up.dataset.catUp);if(i>0)[categories[i-1],categories[i]]=[categories[i],categories[i-1]];}else if(down){const i=Number(down.dataset.catDown);if(i<categories.length-1)[categories[i+1],categories[i]]=[categories[i],categories[i+1]];}else if(del){const i=Number(del.dataset.catDelete),used=entries.some(entry=>entry.category===categories[i]);if(used){showToast('記録で使用中です');return;}categories.splice(i,1);}else{return;}save(STORAGE.categories,categories);renderCategorySelect();renderCategories();});
    $('exportJsonBtn').addEventListener('click',()=>download('study-tracker-backup.json',JSON.stringify({entries,categories,weeklyGoalHours},null,2),'application/json'));
    $('exportCsvBtn').addEventListener('click',()=>{const header=['date','category','minutes','note'],rows=entries.map(entry=>[entry.date,entry.category,entry.minutes,entry.note||'']),csv=[header,...rows].map(row=>row.map(csvCell).join(',')).join('\n');download('study-tracker.csv',csv,'text/csv');});
    $('importJsonBtn').addEventListener('click',()=>$('importFile').click());$('importFile').addEventListener('change',async event=>{const file=event.target.files?.[0];if(!file)return;try{const data=JSON.parse(await file.text());entries=Array.isArray(data.entries)?data.entries:[];categories=Array.isArray(data.categories)?data.categories:defaultCategories;weeklyGoalHours=Number(data.weeklyGoalHours||10);save(STORAGE.entries,entries);save(STORAGE.categories,categories);localStorage.setItem(STORAGE.goal,String(weeklyGoalHours));renderAll();showToast('読み込みました');}catch{showToast('読み込みに失敗しました');}finally{event.target.value='';}});
    function csvCell(value){return `"${String(value).replace(/"/g,'""')}"`;}
    function download(filename,content,type){const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),link=document.createElement('a');link.href=url;link.download=filename;link.click();URL.revokeObjectURL(url);}
    $('dateInput').value=selectedDate;renderAll();
  </script>
</body>
</html>
